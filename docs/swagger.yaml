  internal_rest_api_user.PatchUpdateUserIn:
    properties:
      bio:
        type: string
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  internal_rest_api_user.PatchUpdateUserOut:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      email:
