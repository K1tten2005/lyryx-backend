      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  internal_rest_api_auth.PostSignInOut:
    properties:
      access_token:
        type: string
    type: object
  internal_rest_api_auth.PostSignUpIn:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - email
    - password
    - username
    type: object
  internal_rest_api_auth.PostSignUpOut:
    properties:
      access_token:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  title: lyryx API
  version: "1.0"
paths:
