host: localhost:8080
info:
  contact: {}
  title: lyryx API
  version: "1.0"
paths:
  /v1/artist:
    post:
      consumes:
      - application/json
      description: Создает нового артиста по имени и био. Доступно только модератору.
      parameters:
      - description: Параметры артиста
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_rest_api_artist.PostArtistIn'
      produces:
      - application/json
      responses:
        "201":
          description: Артист успешно создан
          schema:
            $ref: '#/definitions/internal_rest_api_artist.PostArtistOut'
        "400":
          description: Некорректный запрос
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "401":
          description: Пользователь не аутентифицирован
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "403":
          description: Недостаточно прав
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "409":
          description: Имя артиста уже занято
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - ApiKeyAuth: []
      summary: Создание артиста.
      tags:
      - artist
  /v1/artist/{id}:
    get:
      description: Возвращает полную информацию о профиле артиста по его id.
      parameters:
      - description: Artist ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Успешный ответ с профилем артиста
          schema:
            $ref: '#/definitions/internal_rest_api_artist.GetArtistByIDOut'
        "400":
          description: Некорректный id артиста
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "404":
          description: Артист не найден
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/echo.HTTPError'
      summary: Получение данных артиста по его id.
      tags:
      - artist
    patch:
      consumes:
      - application/json
      description: Обновляет name, bio артиста по его id. Достаточно передать только
        нужные поля.
      parameters:
      - description: Параметры обновления профиля артиста
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_rest_api_artist.PatchUpdateArtistIn'
      produces:
      - application/json
      responses:
        "200":
          description: Профиль артиста обновлен
          schema:
            $ref: '#/definitions/internal_rest_api_artist.PatchUpdateArtistOut'
        "400":
          description: Некорректный запрос
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "401":
          description: Пользователь не аутентифицирован
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "404":
          description: Артист не найден
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "409":
          description: Артист с таким именем уже существует
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - ApiKeyAuth: []
      summary: Частичное обновление профиля артиста
      tags:
      - artist
  /v1/artist/{id}/avatar:
    patch:
      consumes:
      - multipart/form-data
      description: Принимает avatar в multipart/form-data, валидирует изображение,
        загружает в MinIO и обновляет ссылку на аватар артиста.
      parameters:
      - description: Файл аватарки (png/jpeg)
        in: formData
        name: avatar
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Аватар артиста обновлен
          schema:
            $ref: '#/definitions/internal_rest_api_artist.PatchUpdateAvatarOut'
        "400":
          description: Некорректный запрос
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "401":
          description: Пользователь не аутентифицирован
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "404":
          description: Артист не найден
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - ApiKeyAuth: []
      summary: Обновление аватарки артиста
      tags:
      - artist
  /v1/auth/refresh:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: Успешное обновление авторизованности
          schema:
            $ref: '#/definitions/internal_rest_api_auth.PostRefreshTokenOut'
        "401":
          description: Пользователь не авторизован
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/echo.HTTPError'
      summary: Проверка refresh токена
      tags:
      - auth
  /v1/auth/sign-in:
    post:
      consumes:
      - application/json
      parameters:
      - description: Параметры запроса.
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_rest_api_auth.PostSignInIn'
      produces:
      - application/json
      responses:
        "200":
          description: Успешный ответ с access_token
          schema:
            $ref: '#/definitions/internal_rest_api_auth.PostSignInOut'
        "400":
          description: Некорректный запрос
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "404":
          description: Неверный email или пароль
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/echo.HTTPError'
      summary: Авторизация пользователя
      tags:
      - auth
  /v1/auth/sign-out:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "401":
          description: Пользователь не авторизован
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - ApiKeyAuth: []
      summary: Выход из аккаунта
      tags:
      - auth
  /v1/auth/sign-up:
    post:
      consumes:
      - application/json
      parameters:
      - description: Параметры запроса.
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_rest_api_auth.PostSignUpIn'
      produces:
      - application/json
      responses:
        "200":
          description: Успешный ответ с access_token
          schema:
            $ref: '#/definitions/internal_rest_api_auth.PostSignUpOut'
        "400":
          description: Некорректный запрос
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "409":
          description: Пользователь уже зарегистрирован
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/echo.HTTPError'
      summary: Регистрация пользователя
      tags:
      - auth
  /v1/song:
    post:
      consumes:
      - application/json
      description: Создает новой песни по заданным параметрам. Доступно только модератору.
      parameters:
      - description: Параметры песни
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_rest_api_song.PostSongIn'
      produces:
      - application/json
      responses:
        "201":
          description: Песня успешно создана
          schema:
            $ref: '#/definitions/internal_rest_api_song.PostSongOut'
        "400":
          description: Некорректный запрос
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "401":
          description: Пользователь не аутентифицирован
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "403":
          description: Недостаточно прав
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - ApiKeyAuth: []
      summary: Создание песни.
      tags:
      - song
  /v1/song/{id}:
    get:
      description: Возвращает полную информацию о песне по ее id.
      parameters:
      - description: Song ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Успешный ответ с информацией о песне
          schema:
            $ref: '#/definitions/internal_rest_api_song.GetSongByIDOut'
        "400":
          description: Некорректный id песни
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "404":
          description: Песня не найдена
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/echo.HTTPError'
      summary: Получение данных песни по ее id.
      tags:
      - artist
    patch:
      consumes:
      - application/json
      description: Обновляет title, lyrics, artist_id, release_date песни по ее id.
        Достаточно передать только нужные поля.
      parameters:
      - description: Параметры обновления информации о песне
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_rest_api_song.PatchUpdateSongIn'
      produces:
      - application/json
      responses:
        "200":
          description: Страница песни обновлена
          schema:
            $ref: '#/definitions/internal_rest_api_song.PatchUpdateSongOut'
        "400":
          description: Некорректный запрос
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "401":
          description: Пользователь не аутентифицирован
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "404":
          description: Песня не найдена
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - ApiKeyAuth: []
      summary: Частичное обновление информации о песне
      tags:
      - song
  /v1/song/{id}/cover:
    patch:
      consumes:
      - multipart/form-data
      description: Принимает cover в multipart/form-data, валидирует изображение,
        загружает в MinIO и обновляет ссылку на обложку песни.
      parameters:
      - description: Файл обложки (png/jpeg)
        in: formData
        name: avatar
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Обложка песни обновлена
          schema:
            $ref: '#/definitions/internal_rest_api_song.PatchUpdateCoverOut'
        "400":
          description: Некорректный запрос
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "401":
          description: Пользователь не аутентифицирован
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "404":
          description: Песня не найдена
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - ApiKeyAuth: []
      summary: Обновление обложки песни
      tags:
      - song
  /v1/user/{id}:
    get:
      description: Возвращает полную информацию о профиле пользователя по его id.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Успешный ответ с профилем пользователя
          schema:
            $ref: '#/definitions/internal_rest_api_user.GetUserByIDOut'
        "400":
          description: Некорректный id пользователя
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/echo.HTTPError'
      summary: Получение данных пользователя по его id.
      tags:
      - user
  /v1/user/me:
    get:
      description: Возвращает полную информацию о профиле текущего пользователя, идентифицированного
        по access_token.
      produces:
      - application/json
      responses:
        "200":
          description: Успешный ответ с профилем пользователя
          schema:
            $ref: '#/definitions/internal_rest_api_user.GetUserMeOut'
        "401":
          description: Пользователь не аутентифицирован
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - ApiKeyAuth: []
      summary: Получение данных своего профиля.
      tags:
      - user
    patch:
      consumes:
      - application/json
      description: Обновляет email, username, bio или password текущего пользователя.
        Достаточно передать только нужные поля.
      parameters:
      - description: Параметры обновления профиля
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_rest_api_user.PatchUpdateUserIn'
      produces:
      - application/json
      responses:
        "200":
          description: Профиль пользователя обновлен
          schema:
            $ref: '#/definitions/internal_rest_api_user.PatchUpdateUserOut'
        "400":
          description: Некорректный запрос
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "401":
          description: Пользователь не аутентифицирован
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "409":
          description: Email или username уже заняты
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - ApiKeyAuth: []
      summary: Частичное обновление профиля пользователя
      tags:
      - user
  /v1/user/me/avatar:
    patch:
      consumes:
      - multipart/form-data
      description: Принимает avatar в multipart/form-data, валидирует изображение,
        загружает в MinIO и обновляет ссылку на аватар текущего пользователя.
      parameters:
      - description: Файл аватарки (png/jpeg)
        in: formData
        name: avatar
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Аватар пользователя обновлен
          schema:
            $ref: '#/definitions/internal_rest_api_user.PatchUpdateAvatarOut'
        "400":
          description: Некорректный запрос
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "401":
          description: Пользователь не аутентифицирован
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - ApiKeyAuth: []
      summary: Обновление аватарки пользователя
      tags:
      - user
swagger: "2.0"
